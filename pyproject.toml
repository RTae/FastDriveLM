[project]
name = "fastdrivelm"
version = "0.2.0"
description = "Add your description here"
readme = "README.md"

requires-python = ">=3.12"
authors = [
    { name = "rtae" }
]

dependencies = [
    "transformers>=4.52.0",
    "accelerate>=1.3.0",
    "soundfile==0.13.1",
    "pillow>=11.1.0",
    "scipy>=1.13.1",
    "torchvision>=0.21.0",
    "backoff==2.2.1",
    "peft==0.15.1",
    "datasets>=4.8.5",
    "wandb>=0.27.0",
    "tensorboard>=2.20.0",
    "evaluate>=0.4.6",
    "rouge-score>=0.1.2",
    "nltk>=3.9.4",
    "pycocoevalcap>=1.2",
]

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[[tool.uv.index]]
url = "https://pypi.tuna.tsinghua.edu.cn/simple"
default = true
